name: Sonar

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  sonar:
    name: Tests and Sonar analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests and build coverage report
        run: mvn -B clean verify

      - name: Run Sonar analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          SONAR_ARGS=()

          if [ -n "$SONAR_HOST_URL" ]; then
            SONAR_ARGS+=("-Dsonar.host.url=$SONAR_HOST_URL")
          fi

          if [ -n "$SONAR_ORGANIZATION" ]; then
            SONAR_ARGS+=("-Dsonar.organization=$SONAR_ORGANIZATION")
          fi

          if [ -n "$SONAR_PROJECT_KEY" ]; then
            SONAR_ARGS+=("-Dsonar.projectKey=$SONAR_PROJECT_KEY")
          fi

          mvn -B sonar:sonar "${SONAR_ARGS[@]}" "-Dsonar.token=$SONAR_TOKEN"
