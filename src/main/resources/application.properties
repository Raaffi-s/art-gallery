# ============================================================
# Database connection - PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/artflow_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console
spring.jpa.show-sql=true

# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true

# Enable query statistics (shows number of SQL per request)
spring.jpa.properties.hibernate.generate_statistics=true

# ============================================================
# SQL Logging - for N+1 demonstration
# GET /api/demo/n-plus-1 -> multiple SELECT per entity (N+1 problem)
# GET /api/paintings     -> single JOIN query (solved via @EntityGraph)
# ============================================================

# Log all SQL queries from Hibernate
logging.level.org.hibernate.SQL=DEBUG

# Log bind parameter values.
#logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Log query statistics
logging.level.org.hibernate.stat=DEBUG

# ============================================================
# HikariCP connection pool
# ============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# Server
# ============================================================
server.port=8080